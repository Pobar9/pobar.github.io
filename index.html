<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="https://media.discordapp.net/attachments/1528690939357298698/1529889482902339805/FWk8.webp?ex=6a63941c&is=6a62429c&hm=5b5c9db9e965cc96d4a3bc742f329e9d565d4eb83c9394596bf9227eeaf4f7c3&=&format=webp">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pobar</title>
  <meta name="description" content="Woof!">
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=cabinet-grotesk@600,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.75rem, 1.2rem + 1.75vw, 2.8rem);
      --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem;
      --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
      --radius-md: 1rem; --radius-lg: 1.5rem; --radius-xl: 2rem; --radius-full: 9999px;
      --color-bg: #f4f0e6;
      --color-surface: rgba(255,255,255,.76);
      --color-surface-2: #fffaf0;
      --color-border: rgba(25,25,25,.12);
      --color-text: #191919;
      --color-text-muted: #55514a;
      --color-primary: #ffe600;
      --color-primary-soft: rgba(255,230,0,.22);
      --shadow: 0 18px 55px rgba(15,15,15,.12);
      --font-display: 'Cabinet Grotesk', 'Inter', sans-serif;
      --font-body: 'General Sans', 'Inter', sans-serif;
    }
    [data-theme="dark"] {
      --color-bg: #090909;
      --color-surface: rgba(18,18,18,.78);
      --color-surface-2: #141414;
      --color-border: rgba(255,255,255,.12);
      --color-text: #f7f4ea;
      --color-text-muted: #c8bea9;
      --color-primary: #ffe600;
      --color-primary-soft: rgba(255,230,0,.24);
      --shadow: 0 18px 55px rgba(0,0,0,.36);
    }
    *,:before,:after{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:1.25rem;
      font-family:var(--font-body);
      font-size:var(--text-base);
      color:var(--color-text);
      background:
        radial-gradient(circle at 14% 18%, rgba(150,150,150,.38), transparent 26%),
        radial-gradient(circle at 85% 16%, rgba(255,230,0,.34), transparent 22%),
        radial-gradient(circle at 78% 82%, rgba(255,230,0,.28), transparent 24%),
        linear-gradient(135deg, rgba(255,230,0,.24) 0%, rgba(255,230,0,0) 38%),
        linear-gradient(120deg, rgba(40,40,40,.44) 0%, rgba(40,40,40,0) 46%),
        var(--color-bg);
    }
    img,svg{display:block;max-width:100%;height:auto}
    a{text-decoration:none;color:inherit}
    input,textarea,button{font:inherit;color:inherit}
    .loader{
      position:fixed;inset:0;display:grid;place-items:center;z-index:9999;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,230,0,.18), transparent 24%),
        linear-gradient(135deg, rgba(255,230,0,.10), rgba(255,230,0,0) 42%),
        #090909;
      transition:opacity .55s ease, visibility .55s ease;
    }
    .loader.is-hidden{opacity:0;visibility:hidden}
    .loader-inner{display:grid;justify-items:center;gap:1rem}
    .loader-logo{font-family:var(--font-display);font-size:clamp(2.5rem, 8vw, 4.75rem);letter-spacing:-.06em;color:#fff9e0}
    .loader-dots{display:flex;gap:.6rem}
    .loader-dots span{
      width:.8rem;height:.8rem;border-radius:999px;background:var(--color-primary);
      animation:bounce 0.4s ease-in-out infinite alternate;
      box-shadow:0 0 18px rgba(255,230,0,.45);
    }
    .loader-dots span:nth-child(2){animation-delay:0.7s}
    .loader-dots span:nth-child(3){animation-delay:0.9s}
    .loader-text{font-size:var(--text-sm);letter-spacing:.18em;text-transform:uppercase;color:#d7cfb1}
    @keyframes bounce{from{transform:translateY(0);opacity:.5}to{transform:translateY(-10px);opacity:1}}
    .card{
      width:min(100%, 30rem);
      background:var(--color-surface);
      backdrop-filter:blur(16px);
      border:1px solid var(--color-border);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .photo-wrap{
      position:relative;
      aspect-ratio: 4 / 3;
      background:linear-gradient(135deg, var(--color-primary-soft), transparent 60%), var(--color-surface-2);
    }
    .photo-wrap img{width:100%;height:100%;object-fit:cover}
    .badge{
      position:absolute;left:1rem;bottom:1rem;padding:.55rem .85rem;border-radius:var(--radius-full);
      background:rgba(16,16,16,.7);color:#fff9ea;font-size:var(--text-sm);font-weight:700;
      border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(10px);
    }
    .content{padding:var(--space-8)}
    h1{font-family:var(--font-display);font-size:var(--text-xl);line-height:1;letter-spacing:-.04em}
    p{margin-top:var(--space-3);color:var(--color-text-muted)}
    .links,.form-grid{display:grid;gap:var(--space-3);margin-top:var(--space-8)}
    .link,.toggle-btn,.send-btn{
      min-height:56px;display:flex;align-items:center;justify-content:space-between;gap:1rem;
      padding:1rem 1.1rem;background:var(--color-surface-2);border:1px solid var(--color-border);
      border-radius:var(--radius-lg);transition:transform .18s ease, border-color .18s ease, background .18s ease, opacity .25s ease, grid-template-rows .28s ease;
    }
    .link:hover,.toggle-btn:hover,.send-btn:hover{transform:translateY(-2px);border-color:rgba(255,230,0,.52);background:var(--color-primary-soft)}
    .link-main,.toggle-main{display:flex;align-items:center;gap:.9rem}
    .icon{
      width:2.5rem;height:2.5rem;border-radius:999px;display:grid;place-items:center;background:var(--color-primary-soft);color:var(--color-primary);flex:none;
    }
    .label{font-weight:700}
    .hint{font-size:var(--text-sm);color:var(--color-text-muted)}
    .arrow{font-size:1.1rem;color:var(--color-text-muted)}
    .message-box{margin-top:var(--space-10);padding-top:var(--space-8);border-top:1px solid var(--color-border)}
    .message-box h2{font-family:var(--font-display);font-size:var(--text-lg);letter-spacing:-.03em}
    .field{display:grid;gap:.55rem}
    .field label{font-size:var(--text-sm);font-weight:700}
    .field input,.field textarea{
      width:100%;padding:1rem 1rem;border-radius:1rem;border:1px solid var(--color-border);
      background:var(--color-surface-2);
    }
    .field textarea{min-height:130px;resize:vertical}
    .send-btn{cursor:pointer;font-weight:700}
    .form-shell{
      display:grid;
      grid-template-rows:0fr;
      transition:grid-template-rows .32s ease;
    }
    .form-shell.is-open{grid-template-rows:1fr}
    .form-shell-inner{overflow:hidden}
    .form-card{margin-top:var(--space-4);padding:var(--space-5);border-radius:var(--radius-lg);background:rgba(255,255,255,.02);border:1px solid var(--color-border)}
    .status{min-height:1.4em;font-size:var(--text-sm);color:var(--color-text-muted)}
    .footer{padding:0 var(--space-8) var(--space-8);font-size:var(--text-sm);color:var(--color-text-muted)}
    @media (prefers-reduced-motion: reduce){.link,.toggle-btn,.send-btn,.form-shell,.loader{transition:none}.loader-dots span{animation:none}}
  </style>
</head>
<body>
  <div class="loader" id="pageLoader" aria-hidden="true">
    <div class="loader-inner">
      <div class="loader-logo">Pobar</div>
      <div class="loader-dots"><span></span><span></span><span></span></div>
      <div class="loader-text">Loading vibe</div>
    </div>
  </div>

  <main class="card" aria-label="Pobar social landing page">
    <section class="photo-wrap">
      <img src="a9FE.png" alt="Hlavní fotografie pro profil Pobar" width="1200" height="900" loading="eager">
      <span class="badge">Pobar</span>
    </section>
    <section class="content">
      <h1>Pobar</h1>
      <p>Awooooooooooooooo!🐕</p>
      <div class="links">
        <a class="link" href="https://t.me/pobar9" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
          <span class="link-main"><span class="icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M21.4 4.6 18.2 19c-.2 1-.8 1.3-1.6.8l-4.4-3.3-2.1 2c-.2.2-.4.4-.9.4l.3-4.5 8.2-7.4c.4-.3-.1-.5-.6-.2L7 13.1l-4.3-1.3c-.9-.3-.9-.9.2-1.3L19.8 4c.8-.3 1.5.2 1.6.6Z"/></svg></span><span><span class="label">Telegram</span><br><span class="hint">Personal contact</span></span></span>
          <span class="arrow">↗</span>
        </a>
        <a class="link" href="https://discord.gg/pK3yUb5pvg" target="_blank" rel="noopener noreferrer" aria-label="Discord">
          <span class="link-main"><span class="icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.3 4.4A16.8 16.8 0 0 0 16.2 3l-.2.4c1.6.4 2.3 1 2.3 1a13.5 13.5 0 0 0-4.2-1.3 14.6 14.6 0 0 0-4.3 0A13.5 13.5 0 0 0 5.6 4.4s.7-.6 2.3-1L7.7 3a16.8 16.8 0 0 0-4.1 1.4C1 8.2.5 12 1 15.7a16.9 16.9 0 0 0 5 2.5l1.1-1.8c-.6-.2-1.1-.5-1.6-.9l.4-.3c3 1.4 6.2 1.4 9.1 0l.4.3c-.5.4-1 .7-1.6.9l1.1 1.8a16.9 16.9 0 0 0 5-2.5c.7-4.2-.2-7.9-1.6-11.3ZM9.5 13.4c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2Zm5 0c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2Z"/></svg></span><span><span class="label">Discord</span><br><span class="hint">Discord server</span></span></span>
          <span class="arrow">↗</span>
        </a>
        <a class="link" href="https://instagram.com/pobar_9" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <span class="link-main"><span class="icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg></span><span><span class="label">Instagram</span><br><span class="hint">Instagram photos</span></span></span>
          <span class="arrow">↗</span>

        <a class="link" href="https://t.me/+OP50O4vq1x5kNDk0" target="_blank" rel="noopener noreferrer" aria-label="Telegram gallery">
          <span class="link-main"><span class="icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5" fill="currentColor" stroke="none"/><path d="m21 15-4.5-4.5L10 17l-2.5-2.5L3 19"/></svg></span><span><span class="label">Telegram galerie</span><br><span class="hint">Personal gallery</span></span></span>
          <span class="arrow">↗</span>
        </a>
      </div>

      <section class="message-box" aria-labelledby="discord-message-title">
        <h2 id="discord-message-title">Discord message</h2>
        <p>Tell me your deepest secret. :D🐕</p>
        <p></p>

        <button class="toggle-btn" type="button" id="toggleMessage" aria-expanded="false" aria-controls="formShell">
          <span class="toggle-main">
            <span class="icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </span>
            <span>
              <span class="label">Send me a message</span><br>
              <span class="hint">Click to open</span>

          <span class="arrow" id="toggleArrow">＋</span>
        </button>

        <div class="form-shell" id="formShell">
          <div class="form-shell-inner">
            <div class="form-card">
              <form id="discordForm" class="form-grid" novalidate>
                <div class="field">
                  <label for="senderName">Name *</label>
                  <input id="senderName" name="name" type="text" placeholder="For ex. Paws" required>
                </div>
                <div class="field">
                  <label for="senderContact">Contact</label>
                  <input id="senderContact" name="contact" type="text" placeholder="Discord, Telegram or nothing" required>
                </div>
                <div class="field">
                  <label for="senderMessage">Message *</label>
                  <textarea id="senderMessage" name="message" placeholder="Write something…" required></textarea>
                </div>
                <button class="send-btn" type="submit">Send</button>
                <p class="status" id="formStatus" aria-live="polite"></p>
              </form>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="./config.js"></script>
  <script>
    (() => {
      const loader = document.getElementById('pageLoader');
      const hideLoader = () => loader.classList.add('is-hidden');
      window.addEventListener('load', () => setTimeout(hideLoader, 1500));
      setTimeout(hideLoader, 3400);

      const toggleButton = document.getElementById('toggleMessage');
      const formShell = document.getElementById('formShell');
      const toggleArrow = document.getElementById('toggleArrow');
      toggleButton.addEventListener('click', () => {
        const isOpen = formShell.classList.toggle('is-open');
        toggleButton.setAttribute('aria-expanded', String(isOpen));
        toggleArrow.textContent = isOpen ? '−' : '＋';
      });

      const form = document.getElementById('discordForm');
      const status = document.getElementById('formStatus');
      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const webhookUrl = 'https://discord.com/api/webhooks/1528690965563310130/1Kc_RtJd1nOLsmsapwi0q95Yy8Y-gBZ-Jz0SzBCZ3gvQHyC_Il8AiQD6dw00T4kq-muq';
        if (!webhookUrl || webhookUrl.includes('PASTE')) {
          status.textContent = 'Nejdřív doplň webhook do souboru config.js.';
          return;
        }
        const data = new FormData(form);
        const payload = {
          embeds: [{
            title: 'Nová zpráva z webu Pobar',
            color: 16770560,
            fields: [
              { name: 'Jméno / přezdívka', value: String(data.get('name') || '-').slice(0, 1024) },
              { name: 'Kontakt', value: String(data.get('contact') || '-').slice(0, 1024) },
              { name: 'Zpráva', value: String(data.get('message') || '-').slice(0, 1024) }
            ],
            footer: { text: 'Odesláno z webu Pobar' },
            timestamp: new Date().toISOString()
          }]
        };
        status.textContent = 'Sending message…';
        try {
          const response = await fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error('Webhook request failed');
          form.reset();
          status.textContent = 'Message sent.';
        } catch (error) {
          status.textContent = 'Something went wrong. Contact owner of this site.';
        }
      });
    })();
  </script>
</body>
</html>
